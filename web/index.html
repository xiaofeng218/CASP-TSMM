<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TSMM Benchmark Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #10131a;
      --panel: #181d25;
      --panel-2: #111722;
      --border: #2d3440;
      --text: #e7edf6;
      --muted: #9aa7b7;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #fb7185;
      --blue: #60a5fa;
      --cyan: #22d3ee;
      --orange: #fb923c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #151a22;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { font-size: 17px; margin: 0 10px 0 0; }
    main { padding: 18px 20px 28px; }
    .badge {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      color: var(--muted);
      background: var(--panel-2);
      white-space: nowrap;
    }
    .badge.ok { color: var(--green); border-color: #1f6f4d; }
    .badge.info { color: var(--blue); border-color: #315b9c; }
    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--muted);
      display: inline-block;
    }
    #status-dot.live { background: var(--green); animation: pulse 1.4s infinite; }
    @keyframes pulse { 50% { opacity: .35; } }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } header { flex-wrap: wrap; } }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .panel h2 {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      margin: 0 0 12px;
      letter-spacing: .04em;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }
    .info-item {
      background: var(--panel-2);
      border: 1px solid #242b36;
      border-radius: 6px;
      padding: 8px;
      min-width: 0;
    }
    .label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
    .value { font-size: 13px; overflow-wrap: anywhere; }
    .chart-wrap { height: 230px; }
    .problem { margin-top: 14px; }
    .problem-head {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-weight: 700;
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td {
      text-align: left;
      border-bottom: 1px solid #262d38;
      padding: 7px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .speed-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .track { height: 6px; flex: 1; background: #303844; border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; border-radius: 999px; }
    .waiting {
      text-align: center;
      color: var(--muted);
      padding: 70px 12px;
    }
    footer {
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <header>
    <span id="status-dot"></span>
    <h1>TSMM Benchmark Dashboard</h1>
    <span id="host" class="badge">Host: -</span>
    <span id="threads" class="badge info">Threads: -</span>
    <span id="layout" class="badge">Layout: -</span>
    <span id="blas" class="badge">BLAS: -</span>
    <span id="avx" class="badge">AVX-512: -</span>
    <span id="updated" class="badge" style="margin-left:auto">Updated: -</span>
  </header>

  <main>
    <div id="waiting" class="waiting">
      <h2>等待 benchmark 结果</h2>
      <p>运行 <code>make run-required</code> 或 <code>./benchmark --output web/results.json</code> 后页面会自动刷新。</p>
    </div>

    <div id="content" style="display:none">
      <div class="layout">
        <section class="panel">
          <h2>System</h2>
          <div id="info" class="info-grid"></div>
        </section>
        <section class="panel">
          <h2>Geometric Mean Speedup</h2>
          <div class="chart-wrap"><canvas id="gm-chart"></canvas></div>
        </section>
      </div>
      <section id="tables"></section>
    </div>
  </main>

  <footer id="footer">Polling every 3 seconds.</footer>

  <script>
    const colors = {
      reference: '#fbbf24',
      naive: '#9aa7b7',
      openmp: '#60a5fa',
      blocked: '#c084fc',
      avx512: '#22d3ee',
      avx512_omp: '#34d399',
      opt: '#fb923c'
    };
    let chart = null;

    function colorFor(name) {
      return colors[name] || '#9aa7b7';
    }

    function speedColor(v) {
      if (v >= 1.05) return '#34d399';
      if (v >= 0.90) return '#fbbf24';
      return '#fb7185';
    }

    function fmt(v, digits = 3) {
      return Number.isFinite(v) ? v.toFixed(digits) : '-';
    }

    function renderInfo(data) {
      const gm = data.geomean_speedup || {};
      const best = Object.entries(gm).sort((a, b) => b[1] - a[1])[0] || ['-', 0];
      const items = [
        ['Host', data.hostname || '-'],
        ['Threads', data.n_threads || '-'],
        ['Layout', data.layout || '-'],
        ['BLAS', (data.blas || '-').toUpperCase()],
        ['AVX-512', data.avx512 ? 'Yes' : 'No'],
        ['Best impl', best[0]],
        ['Best geomean', best[1] ? `${fmt(best[1])}x` : '-'],
        ['Problems done', (data.problems || []).length],
        ['Timestamp', data.timestamp || '-']
      ];
      document.getElementById('info').innerHTML = items.map(([k, v]) => `
        <div class="info-item"><div class="label">${k}</div><div class="value">${v}</div></div>
      `).join('');

      document.getElementById('host').textContent = `Host: ${data.hostname || '-'}`;
      document.getElementById('threads').textContent = `Threads: ${data.n_threads || '-'}`;
      document.getElementById('layout').textContent = `Layout: ${data.layout || '-'}`;
      document.getElementById('blas').textContent = `BLAS: ${(data.blas || '-').toUpperCase()}`;
      document.getElementById('avx').textContent = `AVX-512: ${data.avx512 ? 'Yes' : 'No'}`;
      document.getElementById('avx').className = `badge ${data.avx512 ? 'ok' : ''}`;
    }

    function renderChart(data) {
      const gm = data.geomean_speedup || {};
      const labels = Object.keys(gm);
      const values = labels.map(k => gm[k]);
      const dataset = { data: values, backgroundColor: labels.map(colorFor), borderRadius: 4 };
      if (!chart) {
        chart = new Chart(document.getElementById('gm-chart'), {
          type: 'bar',
          data: { labels, datasets: [dataset] },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { color: '#9aa7b7' }, grid: { color: '#2d3440' } },
              x: { ticks: { color: '#e7edf6' }, grid: { display: false } }
            }
          }
        });
      } else {
        chart.data.labels = labels;
        chart.data.datasets[0] = dataset;
        chart.update('none');
      }
    }

    function renderTables(data) {
      const root = document.getElementById('tables');
      root.innerHTML = '';
      (data.problems || []).forEach(problem => {
        const maxSpeedup = Math.max(1.5, ...problem.impls.map(x => x.speedup || 0));
        const section = document.createElement('section');
        section.className = 'panel problem';
        section.innerHTML = `
          <div class="problem-head">
            <span>${problem.name}</span>
            <span class="badge">m=${problem.m} n=${problem.n} k=${problem.k}</span>
            <span class="badge ${problem.required ? 'ok' : ''}">${problem.required ? 'Required' : 'Optional'}</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Impl</th><th>Time ms</th><th>GFLOPS</th><th>Speedup</th><th>Correct</th>
              </tr>
            </thead>
            <tbody>
              ${problem.impls.map(row => {
                const width = Math.min(100, (row.speedup || 0) / maxSpeedup * 100);
                return `
                  <tr>
                    <td style="color:${colorFor(row.name)};font-weight:700">${row.name}</td>
                    <td>${fmt(row.time_ms)}</td>
                    <td>${fmt(row.gflops, 2)}</td>
                    <td>
                      <div class="speed-cell">
                        <span style="color:${speedColor(row.speedup)};width:58px">${fmt(row.speedup)}x</span>
                        <span class="track"><span class="fill" style="width:${width}%;background:${speedColor(row.speedup)}"></span></span>
                      </div>
                    </td>
                    <td style="color:${row.correct ? '#34d399' : '#fb7185'}">${row.correct ? 'OK' : 'WRONG'}</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`;
        root.appendChild(section);
      });
    }

    async function refresh() {
      try {
        const res = await fetch(`/api/results?ts=${Date.now()}`);
        const data = await res.json();
        if (data.status === 'waiting' || !data.problems) {
          document.getElementById('waiting').style.display = 'block';
          document.getElementById('content').style.display = 'none';
          document.getElementById('status-dot').className = '';
          return;
        }
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('status-dot').className = 'live';
        renderInfo(data);
        renderChart(data);
        renderTables(data);
        const now = new Date().toLocaleTimeString('zh-CN');
        document.getElementById('updated').textContent = `Updated: ${now}`;
        document.getElementById('footer').textContent = `Last refresh: ${now}. Polling every 3 seconds.`;
      } catch (err) {
        document.getElementById('status-dot').className = '';
        console.warn(err);
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
